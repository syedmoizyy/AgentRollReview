services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agent_rollout_review
      POSTGRES_USER: rollout
      POSTGRES_PASSWORD: rollout
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rollout -d agent_rollout_review"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - rollout_postgres:/var/lib/postgresql/data

volumes:
  rollout_postgres:
